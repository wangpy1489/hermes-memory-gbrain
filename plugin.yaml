name: gbrain
version: 0.1.0
description: >
  GBrain memory provider for Hermes Agent. Bridges Hermes' memory pipeline
  (prefetch injection, write-through, tools) to a GBrain knowledge base,
  enabling semantic recall, cross-profile memory sharing, and automatic
  context injection without explicit tool calls.
author: wangpy1489
license: MIT
homepage: https://github.com/wangpy1489/hermes-memory-gbrain
hermes:
  type: memory-provider
  min_version: "0.7.0"
  provider_class: hermes_memory_gbrain.GbrainMemoryProvider
